<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crasher DitzzyMK4 [ V1 ]</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top left, #1a001f, #0d0d0d 60%),
              linear-gradient(135deg, #14001a, #000000);
  background-attachment: fixed;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Boot screen FIXED */
#boot {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  color: #b366ff;
  z-index: 999;
}

header {
  text-align: center;
  padding: 15px;
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  background: rgba(20, 0, 26, 0.9);
  border-bottom: 2px solid #7b00ff;
}

.chatbox {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.message {
  max-width: 75%;
  padding: 10px 15px;
  margin: 6px 0;
  border-radius: 14px;
  word-wrap: break-word;
}

/* USER kanan */
.user {
  align-self: flex-end;
  background: linear-gradient(45deg, #7b00ff, #ff0055);
}

/* AI kiri */
.bot {
  align-self: flex-start;
  background: rgba(40, 0, 50, 0.85);
  border: 1px solid #7b00ff;
}

.input-area {
  display: flex;
  padding: 10px;
  background: rgba(20, 0, 26, 0.95);
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 14px;
}

button {
  margin-left: 10px;
  padding: 12px 15px;
  border: none;
  background: linear-gradient(45deg, #7b00ff, #ff0055);
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="boot">CRASHER DITZZYMK4 INITIALIZING...</div>

<header>
CRASHER DITZZYMK4 [ V1 ]<br>
<span style="font-size:11px;">Owned by RENNXZY</span>
</header>

<div class="chatbox" id="chat"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ketik pesan..." onkeydown="if(event.key==='Enter') sendMessage()">
<button onclick="sendMessage()">Kirim</button>
</div>

<script>
// Boot hilang setelah 2 detik
setTimeout(() => {
  document.getElementById("boot").style.display = "none";
}, 2000);

function sendMessage() {
  const input = document.getElementById("userInput");
  const chat = document.getElementById("chat");

  if (!input.value.trim()) return;

  chat.innerHTML += `<div class="message user">${input.value}</div>`;
  chat.scrollTop = chat.scrollHeight;

  const thinking = document.createElement("div");
  thinking.className = "message bot";
  thinking.innerHTML = "Crasher sedang berpikir...";
  chat.appendChild(thinking);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    thinking.innerHTML = "Crasher aktif. Backend belum terhubung.";
  }, 1000);

  input.value = "";
}
</script>

</body>
</html>
