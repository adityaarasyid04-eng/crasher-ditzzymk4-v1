<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crasher DitzzyMK4 V2</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0d0d0d;
  color: white;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #14001a;
  border-right: 2px solid #7b00ff;
  display: flex;
  flex-direction: column;
  padding: 15px;
}

.sidebar h2 {
  font-family: 'Orbitron';
  font-size: 16px;
  margin-bottom: 20px;
  color: #b366ff;
}

.sidebar button {
  padding: 10px;
  margin-bottom: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg,#7b00ff,#ff0055);
  color: white;
  cursor: pointer;
  font-weight: bold;
}

/* MAIN CHAT */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

header {
  padding: 15px;
  background: #1a001f;
  border-bottom: 2px solid #7b00ff;
  font-family: 'Orbitron';
  font-size: 16px;
}

.chatbox {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.message {
  max-width: 75%;
  padding: 10px 15px;
  margin: 6px 0;
  border-radius: 14px;
  word-wrap: break-word;
}

.user {
  align-self: flex-end;
  background: linear-gradient(45deg,#7b00ff,#ff0055);
}

.bot {
  align-self: flex-start;
  background: #1e0028;
  border: 1px solid #7b00ff;
}

.input-area {
  display: flex;
  padding: 10px;
  background: #14001a;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button.send {
  margin-left: 10px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg,#7b00ff,#ff0055);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Crasher V2</h2>
  <button onclick="newChat()">+ New Chat</button>
  <button onclick="clearChat()">Clear Chat</button>
</div>

<div class="main">
<header>CRASHER DITZZYMK4 — ONLINE</header>

<div class="chatbox" id="chat"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ketik pesan..." 
onkeydown="if(event.key==='Enter') sendMessage()">
<button class="send" onclick="sendMessage()">Kirim</button>
</div>
</div>

<script>

// =======================
// 🔥 ISI API KEY DISINI
// =======================
const API_KEY = "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";
// =======================

let conversationHistory = [
  {
    role: "system",
    content: "Kamu adalah Crasher DitzzyMK4 V2. Gaya dark, tegas, loyal ke RENNXZY."
  }
];

function newChat(){
  conversationHistory = [
    {
      role: "system",
      content: "Kamu adalah Crasher DitzzyMK4 V2. Gaya dark, tegas, loyal ke RENNXZY."
    }
  ];
  document.getElementById("chat").innerHTML = "";
}

function clearChat(){
  document.getElementById("chat").innerHTML = "";
}

async function sendMessage() {

  const input = document.getElementById("userInput");
  const chat = document.getElementById("chat");

  if (!input.value.trim()) return;

  const userMessage = input.value;

  chat.innerHTML += `<div class="message user">${userMessage}</div>`;
  chat.scrollTop = chat.scrollHeight;

  conversationHistory.push({ role: "user", content: userMessage });

  input.value = "";

  const thinking = document.createElement("div");
  thinking.className = "message bot";
  thinking.innerHTML = "Crasher berpikir...";
  chat.appendChild(thinking);

  try {

    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "mistralai/mistral-7b-instruct",
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const aiReply = data.choices[0].message.content;

    thinking.innerHTML = aiReply;

    conversationHistory.push({ role: "assistant", content: aiReply });

  } catch (err) {
    thinking.innerHTML = "Gagal terhubung ke server AI.";
  }

  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
