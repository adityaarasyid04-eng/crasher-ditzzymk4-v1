<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crasher DitzzyMK4 [V1]</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#0f0f0f,#1a001f,#140018);
  color:white;
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#0d0d0d;
  border-right:1px solid #2a0033;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
  transition:0.3s;
}

.sidebar h2{
  color:#c84dff;
  font-size:18px;
}

.new-chat{
  padding:10px;
  background:linear-gradient(90deg,#8a2be2,#ff003c);
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.chat-list{
  font-size:14px;
  opacity:0.7;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

header{
  height:60px;
  background:#140018;
  display:flex;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid #2a0033;
}

.menu-btn{
  background:none;
  border:none;
  color:#c84dff;
  font-size:22px;
  margin-right:15px;
  cursor:pointer;
}

.chat-container{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* MESSAGE */
.message{
  max-width:75%;
  padding:12px 16px;
  border-radius:14px;
  font-size:14px;
  line-height:1.4;
  animation:fadeIn 0.2s ease-in;
}

.user{
  align-self:flex-end;
  background:linear-gradient(90deg,#8a2be2,#ff003c);
}

.ai{
  align-self:flex-start;
  background:#1c1c1c;
  border:1px solid #2a0033;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(5px);}
  to{opacity:1;transform:translateY(0);}
}

/* INPUT */
.input-area{
  display:flex;
  padding:15px;
  background:#140018;
  border-top:1px solid #2a0033;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:14px;
}

button.send{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#8a2be2,#ff003c);
  color:white;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{
    position:fixed;
    left:-260px;
    top:0;
    height:100%;
    z-index:1000;
  }
  .sidebar.active{
    left:0;
  }
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <h2>Crasher DitzzyMK4</h2>
  <button class="new-chat" onclick="newChat()">+ New Chat</button>
  <div class="chat-list">Chat history coming soon...</div>
</div>

<div class="main">
  <header>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    Crasher DitzzyMK4 [V1]
  </header>

  <div class="chat-container" id="chat"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Tulis pesan..." />
    <button class="send" onclick="sendMessage()">Kirim</button>
  </div>
</div>

<script>
const chatContainer = document.getElementById("chat");
const input = document.getElementById("input");

let messages = [
  { role:"system", content:"Kamu adalah Crasher DitzzyMK4. Serius, tegas, loyal, tapi bisa bercanda ringan." }
];

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

function newChat(){
  chatContainer.innerHTML="";
  messages = [
    { role:"system", content:"Kamu adalah Crasher DitzzyMK4. Serius, tegas, loyal, tapi bisa bercanda ringan." }
  ];
}

function addMessage(text,type){
  const div=document.createElement("div");
  div.classList.add("message",type);
  div.innerText=text;
  chatContainer.appendChild(div);
  chatContainer.scrollTop=chatContainer.scrollHeight;
}

async function sendMessage(){
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  messages.push({role:"user",content:text});
  input.value="";

  addMessage("Mengetik...","ai");

  try{
    const response=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages})
    });

    const data=await response.json();

    chatContainer.removeChild(chatContainer.lastChild);

    if(data.error){
      addMessage("Error: "+data.error.message,"ai");
      return;
    }

    const reply=data.choices[0].message.content;
    addMessage(reply,"ai");
    messages.push({role:"assistant",content:reply});

  }catch(err){
    chatContainer.removeChild(chatContainer.lastChild);
    addMessage("Server error.","ai");
  }
}

input.addEventListener("keypress",function(e){
  if(e.key==="Enter") sendMessage();
});
</script>

</body>
</html>
