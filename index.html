<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crasher DitzzyMK4 [ V1 ]</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0d0d0d;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  text-align: center;
  padding: 15px;
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  background: #14001a;
  border-bottom: 2px solid #7b00ff;
}

.chatbox {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.message {
  max-width: 75%;
  padding: 10px 15px;
  margin: 6px 0;
  border-radius: 12px;
  word-wrap: break-word;
}

.user {
  align-self: flex-start;
  background: #1f1f1f;
  border: 1px solid #7b00ff;
}

.bot {
  align-self: flex-end;
  background: #2b0033;
  border: 1px solid #ff0055;
}

.input-area {
  display: flex;
  padding: 10px;
  background: #14001a;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 14px;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  background: linear-gradient(45deg, #7b00ff, #ff0055);
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
CRASHER DITZZYMK4 [ V1 ]  
<br>
<span style="font-size:11px;">Owned by RENNXZY</span>
</header>

<div class="chatbox" id="chat"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ketik pesan...">
<button onclick="sendMessage()">Kirim</button>
</div>

<script>
function sendMessage() {
  const input = document.getElementById("userInput");
  const chat = document.getElementById("chat");

  if (!input.value.trim()) return;

  // Pesan User (kiri)
  chat.innerHTML += `<div class="message user">${input.value}</div>`;

  // Dummy reply dulu (biar keliatan hidup)
  setTimeout(() => {
    chat.innerHTML += `<div class="message bot">Crasher aktif. AI backend belum terhubung.</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
