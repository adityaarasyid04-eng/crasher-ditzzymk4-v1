<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crasher AI Debug</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0d0d0d;
  color:white;
  display:flex;
  height:100vh;
}

.sidebar{
  width:260px;
  background:#14001a;
  border-right:2px solid #7b00ff;
  display:flex;
  flex-direction:column;
  padding:15px;
  overflow-y:auto;
}

.sidebar h2{
  font-family:'Orbitron';
  color:#b366ff;
  font-size:15px;
}

.new-btn{
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#7b00ff,#ff0055);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.chat-item{
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  background:#1e0028;
  cursor:pointer;
  font-size:13px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.chat-item:hover{
  background:#2c0038;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

header{
  padding:15px;
  background:#1a001f;
  border-bottom:2px solid #7b00ff;
  font-family:'Orbitron';
}

.chatbox{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.message{
  max-width:75%;
  padding:10px 15px;
  margin:6px 0;
  border-radius:14px;
  word-wrap:break-word;
}

.user{
  align-self:flex-end;
  background:linear-gradient(45deg,#7b00ff,#ff0055);
}

.bot{
  align-self:flex-start;
  background:#1e0028;
  border:1px solid #7b00ff;
}

.error{
  align-self:flex-start;
  background:#330000;
  border:1px solid red;
  color:#ffaaaa;
}

.input-area{
  display:flex;
  padding:10px;
  background:#14001a;
}

input{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
  outline:none;
}

button.send{
  margin-left:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#7b00ff,#ff0055);
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>Crasher Debug</h2>
  <button class="new-btn" onclick="createNewChat()">+ New Chat</button>
  <div id="chatList"></div>
</div>

<div class="main">
<header>CRASHER AI — DEBUG MODE</header>

<div class="chatbox" id="chat"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ketik pesan..."
onkeydown="if(event.key==='Enter') sendMessage()">
<button class="send" onclick="sendMessage()">Kirim</button>
</div>
</div>

<script>

// =============================
// 🔥 ISI API KEY LU DI SINI
// =============================
const API_KEY = "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";
// =============================

let chats = {};
let currentChatId = null;

function createNewChat(){
  const id = "chat_"+Date.now();
  chats[id] = {
    title:"Chat Baru",
    messages:[
      {role:"system",content:"Kamu adalah AI profesional, cerdas, dan stabil seperti ChatGPT."}
    ]
  };
  currentChatId=id;
  renderChatList();
  loadChat(id);
}

function renderChatList(){
  const chatList=document.getElementById("chatList");
  chatList.innerHTML="";
  Object.keys(chats).reverse().forEach(id=>{
    const div=document.createElement("div");
    div.className="chat-item";
    div.innerText=chats[id].title;
    div.onclick=()=>loadChat(id);
    chatList.appendChild(div);
  });
}

function loadChat(id){
  currentChatId=id;
  const chatbox=document.getElementById("chat");
  chatbox.innerHTML="";
  chats[id].messages.forEach(msg=>{
    if(msg.role==="user"){
      chatbox.innerHTML+=`<div class="message user">${msg.content}</div>`;
    }
    if(msg.role==="assistant"){
      chatbox.innerHTML+=`<div class="message bot">${msg.content}</div>`;
    }
  });
}

async function sendMessage(){
  if(!currentChatId) createNewChat();

  const input=document.getElementById("userInput");
  const chatbox=document.getElementById("chat");

  if(!input.value.trim()) return;

  const text=input.value;

  chatbox.innerHTML+=`<div class="message user">${text}</div>`;
  chats[currentChatId].messages.push({role:"user",content:text});

  if(chats[currentChatId].title==="Chat Baru"){
    chats[currentChatId].title=text.substring(0,25);
  }

  input.value="";

  const thinking=document.createElement("div");
  thinking.className="message bot";
  thinking.innerHTML="Thinking...";
  chatbox.appendChild(thinking);

  try{

    const response=await fetch("https://openrouter.ai/api/v1/chat/completions",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+API_KEY,
        "Content-Type":"application/json",
        "HTTP-Referer":window.location.href,
        "X-Title":"Crasher Debug"
      },
      body:JSON.stringify({
        model:"openai/gpt-3.5-turbo",
        messages:chats[currentChatId].messages
      })
    });

    const data=await response.json();

    if(!response.ok){
      thinking.className="message error";
      thinking.innerHTML=
        "STATUS: "+response.status+
        "<br>ERROR:<br>"+JSON.stringify(data,null,2);
      console.log(data);
      return;
    }

    const reply=data.choices[0].message.content;
    thinking.innerHTML=reply;
    chats[currentChatId].messages.push({role:"assistant",content:reply});

  }catch(err){
    thinking.className="message error";
    thinking.innerHTML="FETCH ERROR:<br>"+err.message;
  }

  renderChatList();
  chatbox.scrollTop=chatbox.scrollHeight;
}

</script>
</body>
</html>
